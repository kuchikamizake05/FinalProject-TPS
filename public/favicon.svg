<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00decb" />
      <stop offset="100%" stop-color="#10ac84" />
    </linearGradient>
  </defs>
  
  <!-- Left tower -->
  <rect x="6" y="20" width="8" height="22" rx="1.5" fill="url(#grad)" fill-opacity="0.5" />
  <rect x="9" y="24" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />
  <rect x="9" y="29" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />
  <rect x="9" y="34" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />

  <!-- Right tower -->
  <rect x="34" y="20" width="8" height="22" rx="1.5" fill="url(#grad)" fill-opacity="0.5" />
  <rect x="37" y="24" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />
  <rect x="37" y="29" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />
  <rect x="37" y="34" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.6" />

  <!-- Center tower -->
  <rect x="16" y="6" width="16" height="36" rx="2" fill="url(#grad)" />
  
  <!-- Elevator shaft glass (dark overlay) -->
  <rect x="22" y="10" width="4" height="28" rx="1" fill="#0f141c" fill-opacity="0.65" />
  
  <!-- Elevator cabins (glowing neon) -->
  <rect x="22.5" y="16" width="3" height="5" rx="0.75" fill="#ffffff" />
  <rect x="22.5" y="28" width="3" height="5" rx="0.75" fill="#00decb" />
  
  <!-- Windows on center tower -->
  <rect x="18" y="12" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="18" y="18" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="18" y="24" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="18" y="30" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  
  <rect x="28" y="12" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="28" y="18" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="28" y="24" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  <rect x="28" y="30" width="2" height="2" rx="0.5" fill="#0f141c" fill-opacity="0.3" />
  
  <!-- Ground line -->
  <rect x="4" y="40" width="40" height="2" rx="1" fill="url(#grad)" />
</svg>